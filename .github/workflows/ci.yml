name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Compile
        run: python -m compileall litminer -q
      - name: Lint
        run: python -m ruff check litminer test
      - name: Type Check
        run: python -m mypy litminer
      - name: Test
        run: python -m unittest discover -s test -p "test_*.py"
  live-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e .
      - name: arXiv smoke
        run: python -m litminer.engine.api_discovery --query "all:graphene" --sources arxiv --max-results-per-query 1 --output check/arxiv_smoke.csv --trace-output check/arxiv_trace.csv --report-output check/arxiv_report.md
      - name: Europe PMC smoke
        run: python -m litminer.engine.api_discovery --query "cancer immunotherapy" --sources europe_pmc --max-results-per-query 1 --output check/europe_pmc_smoke.csv --trace-output check/europe_pmc_trace.csv --report-output check/europe_pmc_report.md
